spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: enterprise-doc-analyzer
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docdb}
    driverClassName: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:docuser}
    password: ${SPRING_DATASOURCE_PASSWORD:docpass123}
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  web:
    resources:
      static-locations: classpath:/static/, classpath:/public/

server:
  port: 8080
  error:
    whitelabel:
      enabled: false

app:
  llm:
    temperature: 0.7
    max-tokens: 2000

  ollama:
    base-url: ${OLLAMA_BASE_URL:http://ollama:11434}
    model: ${OLLAMA_MODEL:mistral}

  voyage:
    api-key: ${VOYAGE_API_KEY:}
    base-url: ${VOYAGE_BASE_URL:https://api.voyageai.com/v1/embeddings}
    model: ${VOYAGE_MODEL:voyage-3}

  chroma:
    url: ${CHROMA_URL:http://localhost:8000}
    embedding-model: all-MiniLM-L6-v2

  storage:
    upload-dir: ./uploads
    max-file-size: 52428800

  chunking:
    chunk-size: 1000
    chunk-overlap: 100
    min-chunk-size: 100

  search:
    top-k: 5
    similarity-threshold: 0.7

logging:
  level:
    root: INFO
    com.docanalysis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"
