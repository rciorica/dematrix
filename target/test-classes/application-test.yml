spring:
  application:
    name: enterprise-doc-analyzer

  datasource:
    url: jdbc:postgresql://localhost:5432/docdb
    username: docuser
    password: docpass123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

app:
  voyage:
    api-key: ${VOYAGE_API_KEY:}
    base-url: https://api.voyageai.com/v1/embeddings
    model: voyage-4
  chroma:
    url: http://localhost:8001
  ollama:
    base-url: http://localhost:11434
    model: mistral
  chunking:
    chunk-size: 1000
    chunk-overlap: 100
    min-chunk-size: 100
  search:
    top-k: 5
    similarity-threshold: 0.7

logging:
  level:
    root: INFO
    com.docanalysis: DEBUG
